# LiteLLM proxy config for the gateway spike. See spike/README.md.
#
# The alias name is load-bearing and must stay `claude-sonnet-4-6`:
#   - Claude Code's model discovery ignores any model whose id doesn't start
#     with `claude` or `anthropic`, so a `gpt-5` alias would be invisible.
#   - CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING=1 only takes effect for Opus/Sonnet
#     4.6 names. Aliasing as an unrecognised name makes Claude Code assume a
#     current model and send `thinking: {"type": "adaptive"}`, which OpenAI 400s.
# Naming it exactly `claude-sonnet-4-6` threads both needles.

model_list:
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

      # gpt-5 is a reasoning model, and LiteLLM routes it to OpenAI's Responses
      # API where reasoning tokens are billed as output and count against
      # max_tokens. Capture is a shallow task, so default effort mostly buys
      # latency and cost on a chat bot. Uncomment to trade thinking for speed:
      # reasoning_effort: low        # minimal | low | medium (default) | high

      # To point the spike at a different model, change the `model:` line only:
      #   model: openai/gpt-5-mini          # cheaper, for a first smoke run
      #   model: openai/gpt-4.1             # non-reasoning; snappier, no budget trap
      #   model: gemini/gemini-3-pro        # + export GEMINI_API_KEY
      #   model: ollama/qwen3:32b           # + api_base: http://localhost:11434
      # Leave `model_name` alone.

litellm_settings:
  # Claude Code sends Anthropic-only fields (output_config, context_management,
  # thinking) that OpenAI rejects with a 400. This drops them instead of
  # forwarding. It is the main reason this spike works at all.
  drop_params: true

general_settings:
  # Local-only shared secret. The bot presents this as its Anthropic
  # credential; the real OPENAI_API_KEY never leaves this process.
  master_key: sk-spike-local
